name: Client Care (Weekly)

on:
  schedule:
    # Every Monday 8am PT (15:00 UTC) — GBP post, reviews, analytics report
    - cron: '0 15 * * 1'
  workflow_dispatch:

jobs:
  client-care:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: pipeline/package-lock.json

      - name: Install deps
        working-directory: pipeline
        run: npm ci

      - name: Run client care agents
        working-directory: pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          OUTREACH_FROM_EMAIL: ${{ secrets.OUTREACH_FROM_EMAIL }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          GBP_ACCOUNT_ID: ${{ secrets.GBP_ACCOUNT_ID }}
          GBP_LOCATION_ID: ${{ secrets.GBP_LOCATION_ID }}
          GITHUB_TOKEN: ${{ secrets.PIPELINE_GITHUB_TOKEN }}
        run: npm run retention
