name: Auto Pipeline (Scheduled)

on:
  schedule:
    # Runs every 6 hours — finds leads, builds sites, deploys, sends outreach
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      niche:
        description: 'Force a specific niche (leave blank for auto-rotation)'
        required: false
        default: ''
      count:
        description: 'Number of leads to process'
        required: false
        default: '3'

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm install --legacy-peer-deps

      - name: Run pipeline
        env:
          GOOGLE_AI_API_KEY:          ${{ secrets.GOOGLE_AI_API_KEY }}
          GOOGLE_PLACES_API_KEY:      ${{ secrets.GOOGLE_PLACES_API_KEY }}
          FIRECRAWL_URL:              ${{ secrets.FIRECRAWL_URL }}
          FIRECRAWL_API_KEY:          ${{ secrets.FIRECRAWL_API_KEY }}
          GITHUB_TOKEN:               ${{ secrets.GH_TOKEN }}
          CLOUDFLARE_TOKEN:           ${{ secrets.CLOUDFLARE_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID:      ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RESEND_API_KEY:             ${{ secrets.RESEND_API_KEY }}
          OUTREACH_FROM_EMAIL:        ${{ secrets.OUTREACH_FROM_EMAIL }}
          DATABASE_URL:               ${{ secrets.DATABASE_URL }}
          LEADS_SHEET_ID:             ${{ secrets.LEADS_SHEET_ID }}
          FAL_KEY:                    ${{ secrets.FAL_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          TEMPLATE_OWNER:             ${{ secrets.TEMPLATE_OWNER }}
          TEMPLATE_REPO:              ${{ secrets.TEMPLATE_REPO }}
          DEPLOY_OWNER:               ${{ secrets.DEPLOY_OWNER }}
          CALENDLY_URL:               ${{ secrets.CALENDLY_URL }}
          WEBSITE_PRICE_ONE_TIME:     ${{ secrets.WEBSITE_PRICE_ONE_TIME }}
          WEBSITE_PRICE_MONTHLY:      ${{ secrets.WEBSITE_PRICE_MONTHLY }}
          DRY_RUN:                    'false'
          WORKER_CONCURRENCY:         '1'
        run: |
          NICHE_ARG=""
          if [ -n "${{ github.event.inputs.niche }}" ]; then
            NICHE_ARG="--niche=${{ github.event.inputs.niche }}"
          fi
          COUNT="${{ github.event.inputs.count || '3' }}"
          cd pipeline && npx tsx src/auto-run.ts --count=$COUNT $NICHE_ARG

      - name: Mark deployed sites in DB
        if: always()
        env:
          DATABASE_URL:  ${{ secrets.DATABASE_URL }}
          GITHUB_TOKEN:  ${{ secrets.GH_TOKEN }}
        run: cd pipeline && npx tsx src/scripts/mark-deployed.ts
