name: AI Lead Pipeline

on:
  schedule:
    # Runs daily at 9am PT (17:00 UTC)
    - cron: '0 17 * * 1-5'
  workflow_dispatch:
    inputs:
      niche:
        description: 'Niche to target'
        required: false
        default: 'hvac'
      location:
        description: 'Location to search'
        required: false
        default: 'Tracy, CA'
      count:
        description: 'Number of leads'
        required: false
        default: '10'
      dry_run:
        description: 'Dry run (no deploy/email)'
        required: false
        default: 'false'
        type: choice
        options: ['true', 'false']

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install deps
        run: npm ci --workspace=pipeline

      - name: Run pipeline
        working-directory: pipeline
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GOOGLE_AI_API_KEY: ${{ secrets.GOOGLE_AI_API_KEY }}
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
          FIRECRAWL_URL: ${{ secrets.FIRECRAWL_URL }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.PIPELINE_GITHUB_TOKEN }}
          CLOUDFLARE_TOKEN: ${{ secrets.CLOUDFLARE_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          OUTREACH_FROM_EMAIL: ${{ secrets.OUTREACH_FROM_EMAIL }}
          TEMPLATE_OWNER: pavankumarharati
          TEMPLATE_REPO: websitedeveloper
          DEPLOY_OWNER: pavankumarharati
          NICHE: ${{ github.event.inputs.niche || 'hvac' }}
          LOCATION: ${{ github.event.inputs.location || 'Tracy, CA' }}
          CITY: Tracy
          STATE: CA
          COUNT: ${{ github.event.inputs.count || '10' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          PIPELINE_API_URL: ${{ secrets.PIPELINE_API_URL }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          BUSINESS_OWNER_EMAIL: ${{ secrets.BUSINESS_OWNER_EMAIL }}
        run: npm start
